<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web App Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        .toolbar {
            padding: 10px;
            background: #f1f3f4;
            border-bottom: 1px solid #dadce0;
        }
        button {
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #1557b0;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button onclick="goBack()">← Back</button>
    </div>
    <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbwDTf9jaLe17B0P9TS3lTBrzymJGG09m0Gt2aQDHz5ud9bBYpJi2-hETr0t_v1lSGy6Eg/exec"></iframe>

    <script>
        function goBack() {
            const iframe = document.getElementById('appFrame');
            try {
                iframe.contentWindow.history.back();
            } catch(e) {
                // If cross-origin, reload the original URL
                iframe.src = iframe.src;
            }
        }
    </script>
</body>
</html>
